{# Pending row shown immediately after an action — polls itself until target status is reached #}
<tr id="ct-row-{{ vmid }}"
    hx-get="/lxc/{{ vmid }}/status/{% if action %}?action={{ action }}{% endif %}"
    hx-trigger="load delay:2s, every 3s"
    hx-target="#ct-row-{{ vmid }}"
    hx-swap="outerHTML">
  <td class="vmid-col">{{ vmid }}</td>
  <td style="vertical-align: middle;font-weight: 600;color: var(--text-header);">{{ ct_name }}</td>
  <td style="vertical-align: middle;">
    <span class="status-badge" style="background: var(--bg-info-light);color: var(--link-color);">
      <span class="spinner" style="width: 10px;height: 10px;border-width: 2px;margin-right: 4px;vertical-align: middle;"></span>
      {{ action_label }}
    </span>
  </td>
  <td colspan="6" style="color: var(--text-muted);font-size: 0.82rem;vertical-align: middle;">Waiting for Proxmox…</td>
</tr>
