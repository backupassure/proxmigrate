{# Error row shown when a VM action fails #}
<tr id="vm-row-{{ vmid }}">
  <td class="vmid-col">{{ vmid }}</td>
  <td colspan="6" style="vertical-align: middle;color: var(--danger-color);font-size: 0.875rem;">
    <i class="fas fa-exclamation-triangle" style="margin-right: 0.4rem;"></i>
    {{ error }}
  </td>
  <td style="vertical-align: middle;">
    <a href="{% url 'inventory' %}" class="button is-small is-light">Refresh</a>
  </td>
</tr>
