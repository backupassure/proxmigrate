{% extends "base.html" %}
{% block title %}Reset Password — ProxMigrate{% endblock %}

{% block public_content %}
<div style="min-height:100vh;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;">

  <div style="text-align:center;margin-bottom:2rem;">
    <div style="font-size:2.5rem;color:#fff;font-weight:800;letter-spacing:-0.5px;margin-bottom:0.35rem;">
      &#9889; ProxMigrate
    </div>
    <div style="color:rgba(255,255,255,0.45);font-size:0.8rem;text-transform:uppercase;letter-spacing:2px;">
      Set New Password
    </div>
  </div>

  <div style="background:#fff;border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,0.4);width:100%;max-width:420px;overflow:hidden;">

    <div style="background:#f5f7fa;border-bottom:1px solid #e8ecf0;padding:1.25rem 2rem;text-align:center;">
      <p style="color:#7a7a7a;font-size:0.85rem;font-weight:500;">Choose a new password</p>
    </div>

    <div style="padding:2rem;">
      {% if error %}
        <div class="notification is-danger is-light" style="margin-bottom:1.25rem;padding:0.75rem 1rem;font-size:0.875rem;">
          <button class="delete is-small" onclick="this.parentElement.remove()"></button>
          {{ error }}
        </div>
      {% endif %}

      <form method="post" action="{% url 'password_reset_confirm' uidb64 token %}">
        {% csrf_token %}

        <div class="field" style="margin-bottom:1.25rem;">
          <label class="label" style="font-size:0.85rem;color:#4a4a4a;font-weight:600;">New Password</label>
          <div class="control has-icons-left">
            <input
              class="input is-medium"
              type="password"
              name="new_password"
              placeholder="At least 8 characters"
              required
              autofocus
              autocomplete="new-password"
            >
            <span class="icon is-left" style="color:#b5b5b5;">
              <i class="fas fa-lock"></i>
            </span>
          </div>
        </div>

        <div class="field" style="margin-bottom:1.75rem;">
          <label class="label" style="font-size:0.85rem;color:#4a4a4a;font-weight:600;">Confirm Password</label>
          <div class="control has-icons-left">
            <input
              class="input is-medium"
              type="password"
              name="confirm_password"
              placeholder="Re-enter your password"
              required
              autocomplete="new-password"
            >
            <span class="icon is-left" style="color:#b5b5b5;">
              <i class="fas fa-lock"></i>
            </span>
          </div>
        </div>

        <div class="field">
          <div class="control">
            <button type="submit" class="button is-primary is-medium is-fullwidth" style="font-weight:600;">
              <span class="icon"><i class="fas fa-key"></i></span>
              <span>Reset Password</span>
            </button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <div style="margin-top:2rem;text-align:center;color:rgba(255,255,255,0.25);font-size:0.75rem;">
    ProxMigrate &mdash; by Backup Assure &mdash; Free &amp; Open Source
  </div>

</div>
{% endblock %}
